<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
<link rel="stylesheet" href="styles.css">
<div class="lhalf">
    <div>
    </div>
</div>
<div class="rhalf">
    <div class="header">
        <p>This is not a real online service! You know you need something
           like this in your life to help you realize your deepest dreams.
        </p>
       <div class="spancol">
          <span>sign up <i>now</i> to get started.</span>
          <span>you <i>know</i> you want to.</span>
       </div>
    </div>
 <div class="midsect">
    <div>Let's do this!</div>
    <div class="formcol">
     <div class="namerow">
      <div class="firstCol">
         <label for="firstName" class="firstlabel">First name</label>
         <input type="text" class="name" id="firstName">
      </div><div class="scndCol">
         <label for="secondName">Second name</label>
         <input type="text" class="name" id="secondName">
      </div>
     </div>


     <div class="informrow">
         <div class="thirdCol">
             <label for="email">E-mail</label>
             <input type="text" id="email">
         </div>
         <div class="fourthCol">
             <label for="mobnum">Phone number</label>
             <input type="text" id="mobnum">
         </div>
     </div>


     <div class="passrow">
         <div class="fifthCol">
             <label for="pass" class="firstlabel">Enter a password</label>
             <input type="password" class="passw" id="pass">
         </div>
         <div class="sixthCol">
             <label for="conpass">Confirm password</label>
             <input type="password" class="passw" id="conpass">
         </div>
     </div>

    </div>
  </div>
  <div class="footer">
    <button>Create Account</button>
    <span>Already have an account? <span class="login">Log in</span></span>
  </div>
</div>
</body>
</html>
